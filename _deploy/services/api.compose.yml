services:
  api:
    restart: unless-stopped
    build: ../../
    container_name: baza-shop-api
    env_file:
      - ../../.env
      - ../.env
    ports:
      - '3000:3000'
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/api/health']
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 10s
    networks:
      - dokploy-network